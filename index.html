      <p>Je m'intéresse aussi à cette mission au-delà du poste. Je suis actionnaire de Time for the Planet parce que les entreprises qu'on soutient disent quelque chose de ce en quoi on croit. <strong>L'approche d'Anthropic sur la sécurité de l'IA n'est pas un argument commercial pour moi</strong> — c'est la raison pour laquelle je préfère travailler ici plutôt qu'ailleurs. J'ai déjà construit des GTM from scratch, sur des marchés qui n'étaient pas prêts. Je sais avancer sans playbook.</p>`
  }
};

let currentLang = 'en';
let isRunning = false;
let whyRevealed = false;

function setLang(lang) {
  if (isRunning) return;
  currentLang = lang;
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.getElementById('btnFR').classList.toggle('active', lang === 'fr');
  const btn = document.getElementById('genBtn');
  btn.textContent = lang === 'en' ? 'Generate CV with Claude · Anthropic API ↗' : 'Générer le CV avec Claude · API Anthropic ↗';
  document.getElementById('sections').innerHTML = '';
  document.getElementById('progress').style.width = '0%';
  document.getElementById('apiStatus').textContent = 'claude-sonnet-4-20250514 · waiting';
  document.getElementById('apiDot').classList.remove('active');
  document.getElementById('whyBtnWrap').classList.remove('visible');
  document.getElementById('whySection').classList.remove('visible');
  document.getElementById('whySection').style.display = 'none';
  whyRevealed = false;
  isRunning = false;
  btn.disabled = false;
}

async function typeHTML(html, el) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const nodes = Array.from(temp.childNodes);
  el.innerHTML = '';
  for (const node of nodes) {
    const clone = node.cloneNode(true);
    el.appendChild(clone);
    await new Promise(r => setTimeout(r, 60));
  }
}

async function startGeneration() {
  if (isRunning) return;
  isRunning = true;
  whyRevealed = false;

  const btn = document.getElementById('genBtn');
  const sectionsEl = document.getElementById('sections');
  const progress = document.getElementById('progress');
  const apiDot = document.getElementById('apiDot');
  const apiStatus = document.getElementById('apiStatus');
  const data = CONTENT[currentLang];

  btn.disabled = true;
  btn.textContent = currentLang === 'en' ? 'Generating...' : 'Génération en cours...';
  apiDot.classList.add('active');
  apiStatus.textContent = 'claude-sonnet-4-20250514 · connected';
  sectionsEl.innerHTML = '';
  progress.style.width = '0%';
  document.getElementById('whyBtnWrap').classList.remove('visible');
  document.getElementById('whySection').classList.remove('visible');
  document.getElementById('whySection').style.display = 'none';

  for (let i = 0; i < data.sections.length; i++) {
    const s = data.sections[i];
    const sectionEl = document.createElement('div');
    sectionEl.className = 'cv-section';
    sectionEl.innerHTML = `
      <div class="section-header">
        <span class="section-dot ${s.dotClass}"></span>
        <span class="section-label">${s.label}</span>
        <span class="section-status" id="status-${s.key}">${currentLang === 'en' ? 'generating...' : 'génération...'}</span>
      </div>
      <div class="section-content" id="content-${s.key}"></div>
    `;
    sectionsEl.appendChild(sectionEl);
    await new Promise(r => setTimeout(r, 50));
    sectionEl.classList.add('visible');

    const contentEl = document.getElementById('content-' + s.key);
    const statusEl = document.getElementById('status-' + s.key);

    await new Promise(r => setTimeout(r, 300));
    await typeHTML(s.html, contentEl);

    statusEl.textContent = currentLang === 'en' ? 'done' : 'complet';
    statusEl.style.color = '#1D9E75';
    progress.style.width = ((i + 1) / data.sections.length * 100) + '%';
    await new Promise(r => setTimeout(r, 250));
  }

  const whyBtnWrap = document.getElementById('whyBtnWrap');
  document.getElementById('whyBtn').textContent = data.whyBtn;
  whyBtnWrap.classList.add('visible');

  btn.disabled = false;
  btn.textContent = currentLang === 'en' ? 'CV generated by Claude ✓' : 'CV généré par Claude ✓';
  apiStatus.textContent = 'claude-sonnet-4-20250514 · complete';
  isRunning = false;
}

async function revealWhy() {
  if (whyRevealed) return;
  whyRevealed = true;

  const data = CONTENT[currentLang];
  const whyBtnWrap = document.getElementById('whyBtnWrap');
  const whySection = document.getElementById('whySection');
  const whyLabel = document.getElementById('whyLabel');
  const whyStatus = document.getElementById('whyStatus');
  const whyContent = document.getElementById('whyContent');

  whyBtnWrap.style.opacity = '0.4';
  document.getElementById('whyBtn').disabled = true;

  whyLabel.textContent = data.whyLabel;
  whyStatus.textContent = data.whyStatus;
  whyContent.innerHTML = '';
  whySection.style.display = 'block';
  await new Promise(r => setTimeout(r, 50));
  whySection.classList.add('visible');

  await new Promise(r => setTimeout(r, 400));
  await typeHTML(data.whyHtml, whyContent);

  whyStatus.textContent = data.whyDone;
  whyStatus.style.color = '#1D9E75';
  whyBtnWrap.style.display = 'none';
}
</script>
